<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trivia Trials</title>
    <link rel="stylesheet" type="text/css" href="./css/style.css">
</head>
<body class="grid">

    <header class="header">
        <section class="projectTitleSection" id="projectTitleSectionID">
            Trivia Trials
        </section>
    </header>

    <section class="main">
        <form class="questionSection" id="questionSectionID">
            <div class="questionPrompt" id="questionPromptID">
                Question Here
            </div>
            <input id="questionAnswerOneButton" name="option" value="1" type="radio">
            <label class="questionAnswerLabel" id="questionAnswerOneLabelID" for="questionAnswerOneButton">
                Answer 1
            </label>
            <input id="questionAnswerTwoButton" name="option" value="2" type="radio">
            <label class="questionAnswerLabel" id="questionAnswerTwoLabelID" for="questionAnswerTwoButton">
                Answer 2
            </label>
            <input id="questionAnswerThreeButton" name="option" value="3" type="radio">
            <label class="questionAnswerLabel" id="questionAnswerThreeLabelID" for="questionAnswerThreeButton">
                Answer 3
            </label>
            <input id="questionAnswerFourButton" name="option" value="4" type="radio">
            <label class="questionAnswerLabel" id="questionAnswerFourLabelID" for="questionAnswerFourButton">
                Answer 4
            </label>
        </form>
    </section>

    <footer class="footer">
        <section class="timerSection" id="timerSectionID">
            timer
        </section>
        <section class="projectLinks" id="projectLinks">

        </section>
    </footer>

</body>
</html>
